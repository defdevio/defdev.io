<svg width="168" height="60" viewBox="0 0 168 60" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style>
      .bg         { fill: #050814; }
      .cube-right { fill: #1E293B; }
      .cube-left  { fill: #4C1D95; }
      .wordmark   { fill: #F9FAFB; }

      @media (prefers-color-scheme: light) {
        .bg         { fill: #ffffff; }
        .cube-right { fill: #CBD5E1; }
        .cube-left  { fill: #6D28D9; }
        .wordmark   { fill: #0F172A; }
      }
    </style>
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="168" height="60" class="bg"/>

  <!-- Cube + wordmark -->
  <g transform="translate(8,38)">
    <!-- Cube -->
    <g transform="translate(0,-20)">
      <polygon points="0,0 18,-10 36,0 18,10"
               fill="url(#circuitGrad)"/>
      <polygon points="18,10 36,0 36,20 18,30"
               class="cube-right"/>
      <polygon points="0,0 18,10 18,30 0,20"
               class="cube-left"/>
    </g>

    <!-- Text -->
    <text x="46" y="6"
          class="wordmark"
          font-family="Segoe UI, system-ui, sans-serif"
          font-size="40"
          font-weight="600"
          textLength="106" lengthAdjust="spacing"
          letter-spacing="1">ferme</text>
  </g>
</svg>
